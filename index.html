<!doctype html>
<html lang="en">
  <head>
    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Load required Bootstrap and BootstrapVue CSS -->
    <link type="text/css" rel="stylesheet" href="//unpkg.com/bootstrap/dist/css/bootstrap.min.css" />
    <link type="text/css" rel="stylesheet" href="//unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.min.css" />
    <!-- Load polyfills to support older browsers -->
    <script src="//polyfill.io/v3/polyfill.min.js?features=es2015%2CIntersectionObserver" crossorigin="anonymous"></script>
    <!-- Load Vue followed by BootstrapVue -->
    <script src="//unpkg.com/vue@latest/dist/vue.min.js"></script>
    <script src="//unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.min.js"></script>
    <!-- Load the following for BootstrapVueIcons support -->
    <script src="//unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue-icons.min.js"></script>
  </head>
  <body>
    <!-- Vue App -->
    <div>
      <b-jumbotron>
        <template v-slot:header>Andrew Bruner</template>
    
        <template v-slot:lead>
          Front-end development is at the intersection of art and logic. A cross of business and exprression. Both left and right brain. A cocktail of design and nerdery. (Chris Coyier)
        </template>
    
        <hr class="my-4">
    
        <p>
          Hello. I'm a Front-end Web and JavaScript Developer. I bridge the gap between design and functionality, creation and continuity.
        </p>
    
        <b-button variant="primary" href="https://twitter.com/andrewbruner">Contact Me</b-button>
        <b-button variant="success" href="https://www.linkedin.com/in/andrewjbruner">Hire Me</b-button>
      </b-jumbotron>
    </div>
  </body>
</html>
